<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Planning</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:#f3f4f6;
margin:0;
padding:12px;
}

.container{
display:flex;
gap:16px;
height:100vh;
}

.calendar{
flex:2;
background:#fff;
border-radius:10px;
padding:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.month-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.date-card{
background:#f8fafc;
border-radius:8px;
padding:8px;
cursor:pointer;
border-left:4px solid #3b82f6;
}

.date{
font-weight:600;
font-size:13px;
}

.small{
font-size:11px;
color:#64748b;
}

.plan-panel{
flex:1;
background:#fff;
border-radius:10px;
padding:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
overflow:auto;
}

.summary{
display:flex;
justify-content:space-between;
background:#eef2ff;
padding:10px;
border-radius:8px;
margin-bottom:12px;
}

.shift{
border:1px solid #e2e8f0;
border-radius:8px;
margin-bottom:10px;
}

.shift-title{
background:#f1f5f9;
padding:8px;
font-weight:600;
}

table{
width:100%;
border-collapse:collapse;
}

input{
width:100%;
padding:4px;
border:1px solid #cbd5e1;
border-radius:6px;
}

.addRow{
margin:6px;
padding:6px;
background:#e2e8f0;
border:none;
border-radius:6px;
cursor:pointer;
}

.saveBtn{
width:100%;
padding:10px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="calendar">

<div class="month-header">
<button onclick="prevMonth()">◀</button>
<span id="monthLabel"></span>
<button onclick="nextMonth()">▶</button>
</div>

<div id="calendarGrid" class="calendar-grid"></div>

</div>

<div class="plan-panel">

<h3>Production Plan <span id="selectedDate"></span></h3>

<div class="summary">
<div>Total Units<br><b id="dailyUnits">0</b></div>
<div>Machines<br><b id="dailyMachines">0</b></div>
<div>SKUs<br><b id="dailySkus">0</b></div>
</div>

<div id="shiftContainer"></div>

<div style="display:flex;gap:8px;margin-top:10px">

<button id="addPlanBtn" class="addRow" onclick="enableAddMode()">Add Plan</button>

<button id="updatePlanBtn" class="addRow" onclick="enableUpdateMode()">Update Plan</button>

<button id="savePlanBtn" class="saveBtn" onclick="savePlan()">Save Plan</button>

</div>

</div>

</div>

<script>

const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="c405dfd0-1ded-11f1-a7bb-af87c4a25aec";
const JWT=new URLSearchParams(location.search).get("token")||"";

const KEYS=[
"Plan_Date",
"Plan_Shift",
"Plan_Machine",
"Plan_SKU",
"Plan_Job_Number",
"Plan_Quantity"
];

const SHIFTS=["A","B","C"];

let plannerMode="view";
let dateHasPlan=false;

let currentMonth=new Date();
let selectedDate=null;
let monthlyData=[];

init();

async function init(){

createShiftTables();
generateCalendar();
await loadMonthData();

lockPlanner();

}

function generateCalendar(){

calendarGrid.innerHTML="";

const year=currentMonth.getFullYear();
const month=currentMonth.getMonth();

monthLabel.innerText=currentMonth.toLocaleString('default',{month:'long',year:'numeric'});

const firstDay=new Date(year,month,1).getDay();
const days=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++) calendarGrid.innerHTML+="<div></div>";

for(let d=1;d<=days;d++){

const date=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

calendarGrid.innerHTML+=`

<div class="date-card" onclick="selectDate('${date}')">
<div class="date">${d}</div>
<div class="small">Planned: <span id="plan_${date}">--</span></div>
</div>

`;

}

}

function prevMonth(){
currentMonth.setMonth(currentMonth.getMonth()-1);
init();
}

function nextMonth(){
currentMonth.setMonth(currentMonth.getMonth()+1);
init();
}

async function loadMonthData(){

const start=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),1).getTime();
const end=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,0,23,59,59).getTime();

const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries`
+`?keys=${KEYS.join(",")}&startTs=${start}&endTs=${end}&limit=5000&agg=NONE`;

const res=await fetch(url,{headers:{"X-Authorization":"Bearer "+JWT}});
const data=await res.json();

const rows={};

Object.entries(data).forEach(([key,arr])=>{
(arr||[]).forEach(p=>{
rows[p.ts]=rows[p.ts]||{ts:p.ts};
rows[p.ts][key]=p.value;
});
});

monthlyData=Object.values(rows);

updateCalendar();

}

function updateCalendar(){

const totals={};

monthlyData.forEach(r=>{

const d=r.Plan_Date;
const q=Number(r.Plan_Quantity)||0;

if(!totals[d]) totals[d]=0;

totals[d]+=q;

});

Object.keys(totals).forEach(d=>{

const el=document.getElementById(`plan_${d}`);

if(el) el.innerText=totals[d];

});

}

function selectDate(date){

selectedDate=date;

document.getElementById("selectedDate").innerText=date;

clearTables();

plannerMode="view";

const rows=monthlyData.filter(r=>r.Plan_Date===date);

dateHasPlan = rows.length>0;

rows.forEach(r=>{

addRow(r.Plan_Shift,r.ts);

const table=document.querySelector(`#table_${r.Plan_Shift}`);
const row=table.lastElementChild;

row.querySelector(".machine").value=r.Plan_Machine||"";
row.querySelector(".sku").value=r.Plan_SKU||"";
row.querySelector(".job").value=r.Plan_Job_Number||"";
row.querySelector(".qty").value=r.Plan_Quantity||"";

});

lockPlanner();

updateButtons();

calcDaily();

}

function updateButtons(){

if(dateHasPlan){

addPlanBtn.style.display="inline-block";
updatePlanBtn.style.display="inline-block";

}else{

addPlanBtn.style.display="inline-block";
updatePlanBtn.style.display="none";

}

savePlanBtn.disabled=true;

}

function lockPlanner(){

document.querySelectorAll(".planRow input").forEach(i=>i.disabled=true);

document.querySelectorAll(".addBtn").forEach(b=>b.disabled=true);

savePlanBtn.disabled=true;

}

function createShiftTables(){

shiftContainer.innerHTML="";

SHIFTS.forEach(s=>{

shiftContainer.innerHTML+=`

<div class="shift">

<div class="shift-title">Shift ${s}</div>

<table>
<thead>
<tr>
<th>Machine</th>
<th>SKU</th>
<th>Job</th>
<th>Qty</th>
<th></th>
</tr>
</thead>

<tbody id="table_${s}"></tbody>
</table>

<button class="addRow addBtn" onclick="addRow('${s}')">+ Add Row</button>

</div>

`;

});

}

function addRow(shift,ts=null){

if(plannerMode==="update") return;

const table=document.getElementById(`table_${shift}`);

const row=document.createElement("tr");
row.className="planRow";
row.dataset.shift=shift;
row.dataset.ts=ts||"";

row.innerHTML=`
<td><input class="machine"></td>
<td><input class="sku"></td>
<td><input class="job"></td>
<td><input class="qty" type="number" oninput="calcDaily()"></td>
<td><button onclick="this.parentElement.parentElement.remove();calcDaily()">🗑</button></td>
`;

table.appendChild(row);

}

function enableAddMode(){

plannerMode="add";

document.querySelectorAll(".planRow input").forEach(i=>i.disabled=true);

document.querySelectorAll(".addBtn").forEach(b=>b.disabled=false);

savePlanBtn.disabled=false;

}

function enableUpdateMode(){

plannerMode="update";

document.querySelectorAll(".planRow input").forEach(i=>i.disabled=false);

document.querySelectorAll(".addBtn").forEach(b=>b.disabled=true);

savePlanBtn.disabled=false;

}

function clearTables(){

SHIFTS.forEach(s=>document.getElementById(`table_${s}`).innerHTML="");

calcDaily();

}

function calcDaily(){

let total=0;
let machines=new Set();
let skus=new Set();

document.querySelectorAll(".planRow").forEach(r=>{

const m=r.querySelector(".machine").value;
const s=r.querySelector(".sku").value;
const q=Number(r.querySelector(".qty").value);

if(q) total+=q;

if(m) machines.add(m);

if(s) skus.add(s);

});

dailyUnits.innerText=total;
dailyMachines.innerText=machines.size;
dailySkus.innerText=skus.size;

}

async function savePlan(){

if(!selectedDate){
alert("Select date first");
return;
}

let payload=[];

document.querySelectorAll(".planRow").forEach(r=>{

const machine=r.querySelector(".machine").value.trim();
const sku=r.querySelector(".sku").value.trim();
const job=r.querySelector(".job").value.trim();
const qty=parseFloat(r.querySelector(".qty").value);
const shift=r.dataset.shift;

if(machine && !isNaN(qty)){

let ts=r.dataset.ts;

if(plannerMode==="add" || !ts){
ts=Date.now()+Math.floor(Math.random()*1000);
}

payload.push({
ts:Number(ts),
values:{
Plan_Date:selectedDate,
Plan_Shift:shift,
Plan_Machine:machine,
Plan_SKU:sku,
Plan_Job_Number:job,
Plan_Quantity:qty
}
});

}

});

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{

method:"POST",

headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

});

alert("Plan saved successfully");

await loadMonthData();

}

</script>

</body>
</html>
