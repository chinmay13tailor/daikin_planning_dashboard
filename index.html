<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Production Planning</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:#f3f4f6;
margin:0;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h2{
color:#1e3a8a;
margin-bottom:20px;
}

.shift{
margin-bottom:20px;
border:1px solid #e2e8f0;
border-radius:8px;
}

.shift-header{
padding:10px;
font-weight:600;
background:#f1f5f9;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:left;
font-size:14px;
}

th{
background:#f8fafc;
}

input{
width:100%;
padding:6px;
border:1px solid #cbd5e1;
border-radius:6px;
}

.addRow{
margin:10px;
padding:6px 12px;
background:#e2e8f0;
border:none;
border-radius:6px;
cursor:pointer;
}

.saveBtn{
margin-top:20px;
padding:10px 16px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.summary{
padding:10px;
background:#f8fafc;
font-size:13px;
}

</style>

</head>

<body>

<div class="card">

<h2>Production Planning</h2>

<label>Select Date</label>
<input type="date" id="planDate">

<div id="shifts"></div>

<button class="saveBtn" onclick="savePlan()">Save Plan</button>

</div>

<script>

/* CONFIG */

const API="https://plantwiz.pimateck.in/api";

const DEVICE_ID="c405dfd0-1ded-11f1-a7bb-af87c4a25aec";

const JWT=new URLSearchParams(location.search).get("token")||"";

const SHIFTS=["A","B","C"];

/* INIT */

const shiftsContainer=document.getElementById("shifts");

SHIFTS.forEach(s=>createShift(s));

/* CREATE SHIFT */

function createShift(shift){

const div=document.createElement("div");

div.className="shift";

div.innerHTML=`

<div class="shift-header">Shift ${shift}</div>

<table>

<thead>
<tr>
<th>Machine</th>
<th>SKU</th>
<th>Job</th>
<th>Qty</th>
<th></th>
</tr>
</thead>

<tbody id="table_${shift}"></tbody>

</table>

<button class="addRow" onclick="addRow('${shift}')">+ Add Row</button>

<div class="summary">
Target: <span id="target_${shift}">0</span> Units
</div>

`;

shiftsContainer.appendChild(div);

}

/* ADD ROW */

function addRow(shift){

const tbody=document.getElementById(`table_${shift}`);

const row=document.createElement("tr");

row.innerHTML=`

<td><input></td>
<td><input></td>
<td><input></td>
<td><input type="number" oninput="calcShift('${shift}')"></td>
<td><button onclick="this.parentElement.parentElement.remove();calcShift('${shift}')">🗑</button></td>

`;

tbody.appendChild(row);

}

/* CALCULATE SHIFT */

function calcShift(shift){

let total=0;

document.querySelectorAll(`#table_${shift} tr`).forEach(r=>{

const q=Number(r.children[3].querySelector("input").value);

total+=q;

});

document.getElementById(`target_${shift}`).innerText=total;

}

/* SAVE PLAN */

async function savePlan(){

const date=document.getElementById("planDate").value;

if(!date){

alert("Select date");

return;

}

let payload=[];

SHIFTS.forEach(shift=>{

document.querySelectorAll(`#table_${shift} tr`).forEach(r=>{

const machine=r.children[0].querySelector("input").value;
const sku=r.children[1].querySelector("input").value;
const job=r.children[2].querySelector("input").value;
const qty=Number(r.children[3].querySelector("input").value);

if(!machine||!qty)return;

payload.push({

ts:new Date(date).getTime(),

values:{
Plan_Date:date,
Plan_Shift:shift,
Plan_Machine:machine,
Plan_SKU:sku,
Plant_Job_Number:job,
Plan_Quantity:qty
}

});

});

});

if(payload.length===0){

alert("No data to save");

return;

}

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{

method:"POST",

headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

});

alert("Plan saved successfully");

}

</script>

</body>
</html>
