<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Planning</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:"Segoe UI",sans-serif;
background:#eef2f7;
margin:0;
padding:10px;
overflow-x:hidden;
}

/* MAIN LAYOUT */

.container{
display:grid;
grid-template-columns:75% 25%;
gap:16px;
height:calc(100vh - 20px);
width:100%;
}

/* CALENDAR PANEL */

.calendar{
background:white;
border-radius:14px;
padding:16px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
display:flex;
flex-direction:column;
height:100%;
}

/* MONTH HEADER */

.month-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
font-size:18px;
font-weight:600;
color:#1e293b;
}

.month-header button{
border:none;
background:#f1f5f9;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.month-header button:hover{
background:#e2e8f0;
}

/* WEEKDAY HEADER */

.weekday-row{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-bottom:8px;
font-size:13px;
font-weight:600;
color:#475569;
text-align:center;
}

/* CALENDAR GRID */

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
flex:1;
}

/* DAY CARD */

.date-card{
background:white;
border-radius:12px;
padding:10px;
cursor:pointer;
border:1px solid #e5e7eb;
border-left:4px solid #3b82f6;
transition:.25s;
height:125px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.date-card:hover{
transform:translateY(-3px);
box-shadow:0 8px 16px rgba(0,0,0,.08);
}

.date{
font-weight:600;
font-size:14px;
color:#0f172a;
}

.small{
font-size:12px;
color:#64748b;
}

/* RIGHT PANEL */

.plan-panel{
background:#f5f6f8;
border-radius:14px;
display:flex;
flex-direction:column;
height:100%;
overflow:hidden;
margin-right:15px;
}

/* HEADER */

.plan-header{
background:#165da8;
color:white;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.plan-title{
font-size:18px;
font-weight:600;
}

.plan-date{
font-size:13px;
opacity:.9;
}

/* SCROLL AREA */

.plan-content{
flex:1;
overflow-y:auto;
padding-right:6px;
}

/* SCROLLBAR */

.plan-content::-webkit-scrollbar{
width:6px;
}

.plan-content::-webkit-scrollbar-thumb{
background:#cbd5e1;
border-radius:6px;
}

/* DAILY CARD */

.daily-card{
background:white;
margin:14px;
border-radius:10px;
padding:14px;
border:1px solid #e2e8f0;
}

.daily-summary{
display:flex;
justify-content:space-between;
}

.metric-label{
font-size:12px;
color:#64748b;
}

.metric-value{
font-size:20px;
font-weight:600;
color:#165da8;
}

/* SHIFT CARD */

.shift{
background:white;
border-radius:10px;
margin:12px;
border:1px solid #e2e8f0;
overflow:hidden;
}

.shift-title{
padding:10px 14px;
font-weight:600;
border-left:4px solid #2563eb;
background:#f8fafc;
}

/* TABLE */

table{
width:100%;
border-collapse:separate;
border-spacing:8px 10px;
font-size:12px;
padding:8px;
}

table th{
color:#475569;
text-align:left;
font-weight:600;
}

input{
width:100%;
padding:7px;
border:1px solid #cbd5e1;
border-radius:6px;
font-size:12px;
}

/* ADD ROW BUTTON */

.addRow{
width:calc(100% - 20px);
margin:10px;
padding:10px;
background:#f8fafc;
border:1px solid #d1d5db;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
}

/* DELETE BUTTON */

.deleteBtn{
background:#ef4444;
color:white;
border:none;
padding:4px 7px;
border-radius:5px;
cursor:pointer;
}

/* BUTTONS */

.plan-buttons{
display:flex;
gap:10px;
padding:14px;
}

.plan-btn{
background:#e2e8f0;
border:none;
padding:10px 12px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.saveBtn{
flex:1;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.saveBtn:hover{
box-shadow:0 6px 16px rgba(37,99,235,.4);
}

  /* VIEW TOGGLE */

.view-toggle{
display:flex;
gap:10px;
margin-bottom:10px;
}

.view-toggle button{
border:none;
background:#e2e8f0;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.view-toggle button.active{
background:#2563eb;
color:white;
}

/* WEEK VIEW */

.week-card{
background:white;
border-radius:10px;
border:1px solid #e5e7eb;
padding:12px;
margin-bottom:10px;
}

.week-title{
font-weight:600;
margin-bottom:6px;
}

.week-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
font-size:13px;
}
</style>
</head>

<body>
<div class="container">

<div class="calendar">
<div class="view-toggle">
<button id="calendarViewBtn" class="active" onclick="showCalendarView()">Calendar View</button>
<button id="weekViewBtn" onclick="showWeekView()">Week View</button>
</div>
<div class="month-header">
<button onclick="prevMonth()">◀</button>
<span id="monthLabel"></span>
<button onclick="nextMonth()">▶</button>
</div>

<div class="weekday-row">
<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
</div>

<div id="calendarView">

<div id="calendarGrid" class="calendar-grid"></div>

</div>

<div id="weekView" style="display:none"></div>

</div>

<div class="plan-panel">

<div class="plan-header">
<div>
<div class="plan-title">Production Plan</div>
<div class="plan-date" id="selectedDate"></div>
</div>
</div>
<div class="plan-content">
<div class="daily-card">

<div class="daily-title">Daily Production Planning</div>

<div class="daily-summary">

<div>
<div class="metric-label">Total Units</div>
<div class="metric-value" id="dailyUnits">0</div>
</div>

<div>
<div class="metric-label">Total Machines</div>
<div class="metric-value" id="dailyMachines">0</div>
</div>

<div>
<div class="metric-label">SKUs Running</div>
<div class="metric-value" id="dailySkus">0</div>
</div>

</div>

</div>

<div id="shiftContainer"></div>

<div class="plan-buttons">

<button id="addPlanBtn" class="plan-btn" onclick="enableAddMode()">Add Plan</button>

<button id="updatePlanBtn" class="plan-btn" onclick="enableUpdateMode()">Update Plan</button>

<button id="savePlanBtn" class="saveBtn" onclick="savePlan()">Save Plan</button>

</div>
</div>
</div>

</div>

<script>

const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="c405dfd0-1ded-11f1-a7bb-af87c4a25aec";
const JWT=new URLSearchParams(location.search).get("token")||"";

const KEYS=[
"Plan_Date",
"Plan_Shift",
"Plan_Machine",
"Plan_SKU",
"Plan_Job_Number",
"Plan_Quantity"
];

const SHIFTS=["A","B","C"];

let plannerMode="view";
let dateHasPlan=false;
let deletedRows=[];

let currentMonth=new Date();
let selectedDate=null;
let monthlyData=[];

init();

async function init(){
createShiftTables();
generateCalendar();
await loadMonthData();
lockPlanner();
}

function generateCalendar(){

calendarGrid.innerHTML="";

const year=currentMonth.getFullYear();
const month=currentMonth.getMonth();

monthLabel.innerText=currentMonth.toLocaleString('default',{month:'long',year:'numeric'});

const firstDay=new Date(year,month,1).getDay();
const days=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++) calendarGrid.innerHTML+="<div></div>";

for(let d=1;d<=days;d++){

const date=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

calendarGrid.innerHTML+=`
<div class="date-card" onclick="selectDate('${date}')">
<div class="date">${d}</div>
<div class="small">Planned: <span id="plan_${date}">--</span></div>
</div>
`;

}

}

function prevMonth(){currentMonth.setMonth(currentMonth.getMonth()-1);init();}
function nextMonth(){currentMonth.setMonth(currentMonth.getMonth()+1);init();}

async function loadMonthData(){

const start=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),1).getTime();
const end=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,0,23,59,59).getTime();

const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${start}&endTs=${end}&limit=5000&agg=NONE`;

const res=await fetch(url,{headers:{"X-Authorization":"Bearer "+JWT}});
const data=await res.json();

const rows={};

Object.entries(data).forEach(([key,arr])=>{
(arr||[]).forEach(p=>{
rows[p.ts]=rows[p.ts]||{ts:p.ts};
rows[p.ts][key]=p.value;
});
});

monthlyData=Object.values(rows);

updateCalendar();

}

function updateCalendar(){

const totals={};

monthlyData.forEach(r=>{
const d=r.Plan_Date;
const q=Number(r.Plan_Quantity)||0;
if(!totals[d]) totals[d]=0;
totals[d]+=q;
});

Object.keys(totals).forEach(d=>{
const el=document.getElementById(`plan_${d}`);
if(el) el.innerText=totals[d];
});

}

function selectDate(date){

selectedDate=date;
document.getElementById("selectedDate").innerText=date;

clearTables();

plannerMode="view";

const rows=monthlyData.filter(r=>r.Plan_Date===date);

dateHasPlan = rows.length>0;

rows.forEach(r=>{
addRow(r.Plan_Shift,r.ts);

const table=document.querySelector(`#table_${r.Plan_Shift}`);
const row=table.lastElementChild;

row.querySelector(".machine").value=r.Plan_Machine||"";
row.querySelector(".sku").value=r.Plan_SKU||"";
row.querySelector(".job").value=r.Plan_Job_Number||"";
row.querySelector(".qty").value=r.Plan_Quantity||"";
});

lockPlanner();
updateButtons();
calcDaily();

}

function updateButtons(){

if(dateHasPlan){
updatePlanBtn.style.display="inline-block";
}else{
updatePlanBtn.style.display="none";
}

savePlanBtn.disabled=true;

}

function lockPlanner(){

document.querySelectorAll(".planRow input").forEach(i=>i.disabled=true);
document.querySelectorAll(".addBtn").forEach(b=>b.disabled=true);
document.querySelectorAll(".deleteBtn").forEach(b=>b.disabled=true);

savePlanBtn.disabled=true;

}

function createShiftTables(){

shiftContainer.innerHTML="";

SHIFTS.forEach(s=>{

shiftContainer.innerHTML+=`

<div class="shift">
<div class="shift-title">Shift ${s}</div>

<table>
<thead>
<tr>
<th>Machine</th>
<th>SKU</th>
<th>Job No.</th>
<th>Qty</th>
<th></th>
</tr>
</thead>

<tbody id="table_${s}"></tbody>
</table>

<button class="addRow addBtn" onclick="addRow('${s}')">+ Add Row</button>

</div>

`;

});

}

function addRow(shift,ts=null){

const table=document.getElementById(`table_${shift}`);

const row=document.createElement("tr");
row.className="planRow";
row.dataset.shift=shift;
row.dataset.ts=ts||"";

if(!ts){
row.dataset.newrow="true";
}

row.innerHTML=`
<td><input class="machine"></td>
<td><input class="sku"></td>
<td><input class="job"></td>
<td><input class="qty" type="number" oninput="calcDaily()"></td>
<td><button class="deleteBtn" onclick="deleteRow(this)">🗑</button></td>
`;

table.appendChild(row);

}

function enableAddMode(){

plannerMode="add";

document.querySelectorAll(".planRow input").forEach(i=>i.disabled=true);
document.querySelectorAll(".addBtn").forEach(b=>b.disabled=false);
document.querySelectorAll(".deleteBtn").forEach(b=>b.disabled=true);

savePlanBtn.disabled=false;

}

function enableUpdateMode(){

plannerMode="update";

document.querySelectorAll(".planRow input").forEach(i=>i.disabled=false);
document.querySelectorAll(".deleteBtn").forEach(b=>b.disabled=false);
document.querySelectorAll(".addBtn").forEach(b=>b.disabled=true);

savePlanBtn.disabled=false;

}

function deleteRow(btn){

if(plannerMode!=="update") return;

if(!confirm("Are you sure you want to delete this plan?")) return;

const row=btn.parentElement.parentElement;

const ts = Number(row.dataset.ts);

if(ts){
deletedRows.push(ts);
}

row.remove();

calcDaily();

}

function clearTables(){
SHIFTS.forEach(s=>document.getElementById(`table_${s}`).innerHTML="");
calcDaily();
}

function calcDaily(){

let total=0;
let machines=new Set();
let skus=new Set();

document.querySelectorAll(".planRow").forEach(r=>{
const m=r.querySelector(".machine").value;
const s=r.querySelector(".sku").value;
const q=Number(r.querySelector(".qty").value);

if(q) total+=q;
if(m) machines.add(m);
if(s) skus.add(s);
});

dailyUnits.innerText=total;
dailyMachines.innerText=machines.size;
dailySkus.innerText=skus.size;

}

async function savePlan(){

if(!selectedDate){
alert("Select date first");
return;
}

/* DELETE TELEMETRY */

for(const ts of deletedRows){

await fetch(
`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/delete?keys=Plan_Date,Plan_Shift,Plan_Machine,Plan_SKU,Plan_Job_Number,Plan_Quantity&startTs=${ts-1}&endTs=${ts+1}&rewriteLatestIfDeleted=true`,
{
method:"DELETE",
headers:{
"X-Authorization":"Bearer "+JWT
}
}
);

}

deletedRows=[];

let payload=[];

let baseTs = Date.now();
let counter = 0;

document.querySelectorAll(".planRow").forEach(r=>{

const machine=r.querySelector(".machine").value.trim();
const sku=r.querySelector(".sku").value.trim();
const job=r.querySelector(".job").value.trim();
const qty=parseFloat(r.querySelector(".qty").value);
const shift=r.dataset.shift;

if(!machine || isNaN(qty)) return;

if(plannerMode==="add"){

if(r.dataset.newrow!=="true") return;

counter++;

payload.push({
ts: baseTs + (counter * 3),
values:{
Plan_Date:selectedDate,
Plan_Shift:shift,
Plan_Machine:machine,
Plan_SKU:sku,
Plan_Job_Number:job,
Plan_Quantity:qty
}
});

}

else if(plannerMode==="update"){

const ts=r.dataset.ts;

if(!ts) return;

payload.push({
ts:Number(ts),
values:{
Plan_Date:selectedDate,
Plan_Shift:shift,
Plan_Machine:machine,
Plan_SKU:sku,
Plan_Job_Number:job,
Plan_Quantity:qty
}
});

}

});

if(payload.length===0){
alert("No changes to save");
return;
}

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{

method:"POST",
headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},
body:JSON.stringify(payload)

});

alert("Plan saved successfully");

await loadMonthData();

selectDate(selectedDate);

}

  function showCalendarView(){

document.getElementById("calendarView").style.display="block"
document.getElementById("weekView").style.display="none"

calendarViewBtn.classList.add("active")
weekViewBtn.classList.remove("active")

}

function showWeekView(){

document.getElementById("calendarView").style.display="none"
document.getElementById("weekView").style.display="block"

calendarViewBtn.classList.remove("active")
weekViewBtn.classList.add("active")

renderWeekView()

}

function renderWeekView(){

const container=document.getElementById("weekView")
container.innerHTML=""

const year=currentMonth.getFullYear()
const month=currentMonth.getMonth()

const days=new Date(year,month+1,0).getDate()

const weeks=Math.ceil(days/7)

for(let w=1;w<=weeks;w++){

let start=(w-1)*7+1
let end=Math.min(w*7,days)

let total=0
let sku={}
let machine={}

monthlyData.forEach(r=>{

const d=new Date(r.Plan_Date).getDate()

if(d>=start && d<=end){

const qty=Number(r.Plan_Quantity)||0

total+=qty

if(!sku[r.Plan_SKU]) sku[r.Plan_SKU]=0
if(!machine[r.Plan_Machine]) machine[r.Plan_Machine]=0

sku[r.Plan_SKU]+=qty
machine[r.Plan_Machine]+=qty

}

})

const skuText=Object.entries(sku).map(([k,v])=>`${k}: ${v}`).join(", ") || "No Data"
const machineText=Object.entries(machine).map(([k,v])=>`${k}: ${v}`).join(", ") || "No Data"

container.innerHTML+=`

<div class="week-card">

<div class="week-title">
Week ${w} (${start}-${end})
</div>

<div class="week-grid">

<div>
<b>Total Planned</b><br>
${total}
</div>

<div>
<b>SKU Wise</b><br>
${skuText}
</div>

<div>
<b>Machine Wise</b><br>
${machineText}
</div>

</div>

</div>

`

}

}

</script>

</body>
</html>
