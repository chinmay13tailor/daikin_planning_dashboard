<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Planning</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:"Segoe UI",sans-serif;
background:#eef2f7;
margin:0;
padding:10px;
overflow-x:hidden;
}

/* MAIN LAYOUT */

.container{
display:grid;
grid-template-columns:75% 25%;
gap:16px;
height:calc(100vh - 20px);
width:100%;
}

/* CALENDAR PANEL */

.calendar{
background:white;
border-radius:14px;
padding:16px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
display:flex;
flex-direction:column;
height:100%;
}

/* VIEW TOGGLE */

.view-toggle{
display:flex;
gap:10px;
margin-bottom:10px;
}

.view-toggle button{
border:none;
background:#e2e8f0;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.view-toggle button.active{
background:#2563eb;
color:white;
}

/* MONTH HEADER */

.month-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
font-size:18px;
font-weight:600;
color:#1e293b;
}

.month-header button{
border:none;
background:#f1f5f9;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.month-header button:hover{
background:#e2e8f0;
}

/* WEEKDAY HEADER */

.weekday-row{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-bottom:8px;
font-size:13px;
font-weight:600;
color:#475569;
text-align:center;
}

/* CALENDAR GRID */

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
flex:1;
}

/* DAY CARD */

.date-card{
background:white;
border-radius:12px;
padding:10px;
cursor:pointer;
border:1px solid #e5e7eb;
border-left:4px solid #3b82f6;
transition:.25s;
height:125px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.date-card:hover{
transform:translateY(-3px);
box-shadow:0 8px 16px rgba(0,0,0,.08);
}

.date{
font-weight:600;
font-size:14px;
color:#0f172a;
}

.small{
font-size:12px;
color:#64748b;
}

/* WEEK VIEW */

.week-container{
overflow-y:auto;
padding-right:6px;
}

.week-card{
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:10px;
padding:12px;
margin-bottom:10px;
}

.week-title{
font-weight:600;
margin-bottom:8px;
}

.week-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
font-size:13px;
}

/* RIGHT PANEL */

.plan-panel{
background:#f5f6f8;
border-radius:14px;
display:flex;
flex-direction:column;
height:100%;
overflow:hidden;
margin-right:15px;
}

/* HEADER */

.plan-header{
background:#165da8;
color:white;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.plan-title{
font-size:18px;
font-weight:600;
}

.plan-date{
font-size:13px;
opacity:.9;
}

/* SCROLL AREA */

.plan-content{
flex:1;
overflow-y:auto;
padding-right:6px;
}

/* SCROLLBAR */

.plan-content::-webkit-scrollbar{
width:6px;
}

.plan-content::-webkit-scrollbar-thumb{
background:#cbd5e1;
border-radius:6px;
}

/* DAILY CARD */

.daily-card{
background:white;
margin:14px;
border-radius:10px;
padding:14px;
border:1px solid #e2e8f0;
}

.daily-summary{
display:flex;
justify-content:space-between;
}

.metric-label{
font-size:12px;
color:#64748b;
}

.metric-value{
font-size:20px;
font-weight:600;
color:#165da8;
}

/* SHIFT CARD */

.shift{
background:white;
border-radius:10px;
margin:12px;
border:1px solid #e2e8f0;
overflow:hidden;
}

.shift-title{
padding:10px 14px;
font-weight:600;
border-left:4px solid #2563eb;
background:#f8fafc;
}

/* TABLE */

table{
width:100%;
border-collapse:separate;
border-spacing:8px 10px;
font-size:12px;
padding:8px;
}

table th{
color:#475569;
text-align:left;
font-weight:600;
}

input{
width:100%;
padding:7px;
border:1px solid #cbd5e1;
border-radius:6px;
font-size:12px;
}

/* ADD ROW BUTTON */

.addRow{
width:calc(100% - 20px);
margin:10px;
padding:10px;
background:#f8fafc;
border:1px solid #d1d5db;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
}

/* DELETE BUTTON */

.deleteBtn{
background:#ef4444;
color:white;
border:none;
padding:4px 7px;
border-radius:5px;
cursor:pointer;
}

/* BUTTONS */

.plan-buttons{
display:flex;
gap:10px;
padding:14px;
}

.plan-btn{
background:#e2e8f0;
border:none;
padding:10px 12px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.saveBtn{
flex:1;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.saveBtn:hover{
box-shadow:0 6px 16px rgba(37,99,235,.4);
}

</style>
</head>

<body>

<div class="container">

<div class="calendar">

<div class="view-toggle">
<button id="calendarBtn" class="active" onclick="showCalendar()">Calendar View</button>
<button id="weekBtn" onclick="showWeek()">Week View</button>
</div>

<div id="calendarSection">

<div class="month-header">
<button onclick="prevMonth()">◀</button>
<span id="monthLabel"></span>
<button onclick="nextMonth()">▶</button>
</div>

<div class="weekday-row">
<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
</div>

<div id="calendarGrid" class="calendar-grid"></div>

</div>

<div id="weekSection" style="display:none" class="week-container"></div>

</div>


<div class="plan-panel">

<div class="plan-header">
<div>
<div class="plan-title">Production Plan</div>
<div class="plan-date" id="selectedDate"></div>
</div>
</div>

<div class="plan-content">

<div class="daily-card">

<div class="daily-summary">

<div>
<div class="metric-label">Total Units</div>
<div class="metric-value" id="dailyUnits">0</div>
</div>

<div>
<div class="metric-label">Total Machines</div>
<div class="metric-value" id="dailyMachines">0</div>
</div>

<div>
<div class="metric-label">SKUs Running</div>
<div class="metric-value" id="dailySkus">0</div>
</div>

</div>

</div>

<div id="shiftContainer"></div>

<div class="plan-buttons">

<button id="addPlanBtn" class="plan-btn" onclick="enableAddMode()">Add Plan</button>

<button id="updatePlanBtn" class="plan-btn" onclick="enableUpdateMode()">Update Plan</button>

<button id="savePlanBtn" class="saveBtn" onclick="savePlan()">Save Plan</button>

</div>

</div>

</div>

</div>

<script>

/* VIEW TOGGLE */

function showCalendar(){
document.getElementById("calendarSection").style.display="block"
document.getElementById("weekSection").style.display="none"
calendarBtn.classList.add("active")
weekBtn.classList.remove("active")
}

function showWeek(){
document.getElementById("calendarSection").style.display="none"
document.getElementById("weekSection").style.display="block"
calendarBtn.classList.remove("active")
weekBtn.classList.add("active")
renderWeekView()
}

/* WEEK VIEW */

function renderWeekView(){

const container=document.getElementById("weekSection")
container.innerHTML=""

const weeks={}

monthlyData.forEach(r=>{

const date=new Date(r.Plan_Date)
const week=Math.ceil(date.getDate()/7)

if(!weeks[week]){
weeks[week]={total:0,sku:{},machine:{}}
}

const qty=Number(r.Plan_Quantity)||0

weeks[week].total+=qty

if(!weeks[week].sku[r.Plan_SKU]) weeks[week].sku[r.Plan_SKU]=0
if(!weeks[week].machine[r.Plan_Machine]) weeks[week].machine[r.Plan_Machine]=0

weeks[week].sku[r.Plan_SKU]+=qty
weeks[week].machine[r.Plan_Machine]+=qty

})

Object.keys(weeks).forEach(w=>{

const data=weeks[w]

const sku=Object.entries(data.sku).map(([k,v])=>k+" : "+v).join(", ")
const machine=Object.entries(data.machine).map(([k,v])=>k+" : "+v).join(", ")

container.innerHTML+=`

<div class="week-card">

<div class="week-title">Week ${w}</div>

<div class="week-grid">

<div><b>Total Planned</b><br>${data.total}</div>

<div><b>SKU Wise</b><br>${sku}</div>

<div><b>Machine Wise</b><br>${machine}</div>

</div>

</div>

`

})

}

</script>

</body>
</html>
