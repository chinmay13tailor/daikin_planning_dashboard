<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Planning</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:#f3f4f6;
margin:0;
padding:15px;
}

.container{
display:flex;
gap:16px;
}

/* CALENDAR */

.calendar{
flex:2;
background:#fff;
border-radius:10px;
padding:14px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.month-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.month-header button{
border:none;
background:#e2e8f0;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.date-card{
background:#f8fafc;
border-radius:8px;
padding:8px;
cursor:pointer;
border-left:4px solid #3b82f6;
}

.date{
font-weight:600;
font-size:13px;
}

.small{
font-size:11px;
color:#64748b;
}

/* PLAN PANEL */

.plan-panel{
flex:1;
background:#fff;
border-radius:10px;
padding:14px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.plan-header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.summary{
background:#eef2ff;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
margin-bottom:14px;
}

.shift{
border:1px solid #e2e8f0;
border-radius:8px;
margin-bottom:12px;
}

.shift-title{
background:#f1f5f9;
padding:8px;
font-weight:600;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:6px;
font-size:12px;
}

th{
background:#f8fafc;
}

input{
width:100%;
padding:4px;
border:1px solid #cbd5e1;
border-radius:6px;
}

.addRow{
margin:8px;
padding:6px;
background:#e2e8f0;
border:none;
border-radius:6px;
cursor:pointer;
}

.saveBtn{
width:100%;
padding:8px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- CALENDAR -->

<div class="calendar">

<div class="month-header">

<button onclick="prevMonth()">◀</button>

<span id="monthLabel"></span>

<button onclick="nextMonth()">▶</button>

</div>

<div id="calendarGrid" class="calendar-grid"></div>

</div>


<!-- PLANNING PANEL -->

<div class="plan-panel">

<div class="plan-header">
<h3>Production Plan</h3>
<span id="selectedDate"></span>
</div>

<div class="summary">

<div>
Total Units<br>
<b id="dailyUnits">0</b>
</div>

<div>
Machines<br>
<b id="dailyMachines">0</b>
</div>

<div>
SKUs<br>
<b id="dailySkus">0</b>
</div>

</div>

<div id="shiftContainer"></div>

<button class="saveBtn" onclick="savePlan()">Save Plan</button>

</div>

</div>


<script>

/* CONFIG */

const API="https://plantwiz.pimateck.in/api";

const DEVICE_ID="c405dfd0-1ded-11f1-a7bb-af87c4a25aec";

const JWT=new URLSearchParams(location.search).get("token")||"";

const SHIFTS=["A","B","C"];

let currentMonth=new Date();
let selectedDate=null;


/* INIT */

generateCalendar();
createShiftTables();


/* CALENDAR */

function generateCalendar(){

calendarGrid.innerHTML="";

const year=currentMonth.getFullYear();
const month=currentMonth.getMonth();

monthLabel.innerText=currentMonth.toLocaleString('default',{month:'long',year:'numeric'});

const firstDay=new Date(year,month,1).getDay();
const days=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
calendarGrid.innerHTML+="<div></div>";
}

for(let d=1;d<=days;d++){

const date=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

calendarGrid.innerHTML+=`

<div class="date-card" onclick="selectDate('${date}')">

<div class="date">${d}</div>
<div class="small">Planned: --</div>
<div class="small">Actual: --</div>

</div>

`;

}

}

function prevMonth(){

currentMonth.setMonth(currentMonth.getMonth()-1);
generateCalendar();

}

function nextMonth(){

currentMonth.setMonth(currentMonth.getMonth()+1);
generateCalendar();

}


/* SELECT DATE */

function selectDate(date){

selectedDate=date;

document.getElementById("selectedDate").innerText=date;

clearTables();

}


/* CREATE SHIFT TABLES */

function createShiftTables(){

shiftContainer.innerHTML="";

SHIFTS.forEach(s=>{

shiftContainer.innerHTML+=`

<div class="shift">

<div class="shift-title">Shift ${s}</div>

<table>

<thead>
<tr>
<th>Machine</th>
<th>SKU</th>
<th>Job</th>
<th>Qty</th>
<th></th>
</tr>
</thead>

<tbody id="table_${s}"></tbody>

</table>

<button class="addRow" onclick="addRow('${s}')">+ Add Row</button>

</div>

`;

});

}


/* ADD ROW */

function addRow(shift){

const table=document.getElementById(`table_${shift}`);

const row=document.createElement("tr");

row.className="planRow";
row.dataset.shift=shift;

row.innerHTML=`

<td><input class="machine"></td>
<td><input class="sku"></td>
<td><input class="job"></td>
<td><input class="qty" type="number" oninput="calcDaily()"></td>
<td><button onclick="this.parentElement.parentElement.remove();calcDaily()">🗑</button></td>

`;

table.appendChild(row);

}


/* CLEAR TABLES */

function clearTables(){

SHIFTS.forEach(s=>{
document.getElementById(`table_${s}`).innerHTML="";
});

calcDaily();

}


/* DAILY SUMMARY */

function calcDaily(){

let total=0;
let machines=new Set();
let skus=new Set();

document.querySelectorAll(".planRow").forEach(r=>{

const m=r.querySelector(".machine").value;
const s=r.querySelector(".sku").value;
const q=Number(r.querySelector(".qty").value);

if(q) total+=q;
if(m) machines.add(m);
if(s) skus.add(s);

});

dailyUnits.innerText=total;
dailyMachines.innerText=machines.size;
dailySkus.innerText=skus.size;

}


/* SAVE PLAN */

async function savePlan(){

if(!selectedDate){

alert("Select a date from calendar first");

return;

}

let payload=[];

document.querySelectorAll(".planRow").forEach(r=>{

const machine=r.querySelector(".machine").value;
const sku=r.querySelector(".sku").value;
const job=r.querySelector(".job").value;
const qty=Number(r.querySelector(".qty").value);
const shift=r.dataset.shift;

if(!machine || !qty) return;

payload.push({

ts:new Date(selectedDate).getTime(),

values:{
Plan_Date:selectedDate,
Plan_Shift:shift,
Plan_Machine:machine,
Plan_SKU:sku,
Plant_Job_Number:job,
Plan_Quantity:qty
}

});

});

console.log("Telemetry Payload:",payload);

if(payload.length===0){

alert("No data to save");

return;

}

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{

method:"POST",

headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

});

alert("Plan saved successfully");

}

</script>

</body>
</html>
